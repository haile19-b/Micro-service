services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_dev
    # Bind only to 127.0.0.1 so it's not exposed to your local network
    ports:
      - "127.0.0.1:27018:27018"
    # Removed MONGO_INITDB environment variables to disable auth for dev
    command: ["--replSet", "rs0", "--port", "27018"]
    volumes:
      - mongodb_data:/data/db
  redis:                                 # ← ADD THIS
    image: redis:7-alpine
    container_name: redis_dev
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
    driver: local
  redis_data:                            # ← ADD THIS
    driver: local